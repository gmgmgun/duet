<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI·PAIR — Claude × Codex</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #07090c;
    --bg-raise: #0c1014;
    --bg-panel: #0e1318;
    --line: #1b2430;
    --line-bright: #2a3a4d;
    --text: #e2ebf4;
    --text-dim: #93a8bd;
    --text-faint: #62788e;
    --claude: #ffb454;
    --claude-dim: rgba(255, 180, 84, .12);
    --codex: #5ccfe6;
    --codex-dim: rgba(92, 207, 230, .1);
    --ok: #aad94c;
    --err: #f07178;
    --warn: #ffd173;
    --mono: 'IBM Plex Mono', Consolas, monospace;
    --disp: 'Chakra Petch', var(--mono);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    overflow: hidden;
  }
  /* 스캔라인 + 비네트 — 단말기 분위기 (가독성을 위해 아주 옅게) */
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 999;
    background:
      repeating-linear-gradient(0deg, rgba(255,255,255,.007) 0 1px, transparent 1px 3px),
      radial-gradient(ellipse at 50% 0%, transparent 75%, rgba(0,0,0,.18) 100%);
  }

  /* ───── 상단 바 ───── */
  header {
    height: 52px; display: flex; align-items: center; gap: 16px;
    padding: 0 20px; border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, #0d1218, #090d11);
  }
  .logo { font-family: var(--disp); font-weight: 700; font-size: 17px; letter-spacing: .14em; }
  .logo .x { color: var(--text-faint); padding: 0 6px; }
  .logo .c1 { color: var(--claude); }
  .logo .c2 { color: var(--codex); }
  .logo .cursor { display: inline-block; width: 9px; height: 16px; background: var(--ok);
    margin-left: 8px; vertical-align: -2px; animation: blink 1.1s steps(1) infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  .srv { margin-left: auto; display: flex; align-items: center; gap: 8px;
    font-size: 11px; color: var(--text-dim); letter-spacing: .08em; }
  .led { width: 8px; height: 8px; border-radius: 50%; background: var(--ok);
    box-shadow: 0 0 8px var(--ok); animation: pulse 2.4s ease-in-out infinite; }
  .led.busy { background: var(--claude); box-shadow: 0 0 8px var(--claude); animation-duration: .9s; }
  @keyframes pulse { 50% { opacity: .45; } }

  /* ───── 레이아웃 ───── */
  main { display: grid; grid-template-columns: 380px 1fr; height: calc(100% - 52px); }

  /* ───── 좌측: 폼 + 작업 목록 ───── */
  aside { border-right: 1px solid var(--line); display: flex; flex-direction: column; min-height: 0; }
  .formbox { padding: 18px 18px 14px; border-bottom: 1px solid var(--line); background: var(--bg-raise); }
  .formbox h2, .listhead {
    font-family: var(--disp); font-size: 11px; font-weight: 600; letter-spacing: .22em;
    color: var(--text-dim); text-transform: uppercase; margin-bottom: 12px;
  }
  .listhead { padding: 14px 18px 0; margin-bottom: 8px; }
  label { display: block; font-size: 11px; letter-spacing: .12em; color: var(--text-dim);
    text-transform: uppercase; margin: 12px 0 5px; white-space: nowrap; }
  textarea, input, select {
    width: 100%; background: var(--bg); color: var(--text);
    border: 1px solid var(--line); border-radius: 3px;
    font-family: var(--mono); font-size: 13.5px; padding: 8px 10px;
    outline: none; transition: border-color .15s;
  }
  textarea:focus, input:focus, select:focus { border-color: var(--line-bright); }
  select { cursor: pointer; }
  select option { background: var(--bg-panel); }
  textarea { min-height: 96px; resize: vertical; line-height: 1.55; }
  .row2 { display: grid; grid-template-columns: 1fr 110px; gap: 10px; }
  .row2.eq { grid-template-columns: 1fr 1fr; }
  button.submit {
    margin-top: 16px; width: 100%; padding: 10px;
    font-family: var(--disp); font-weight: 700; font-size: 13px; letter-spacing: .18em;
    color: #0a0c08; background: var(--ok); border: none; border-radius: 3px; cursor: pointer;
    transition: filter .15s, transform .05s;
  }
  button.submit:hover { filter: brightness(1.12); }
  button.submit:active { transform: translateY(1px); }
  button.submit:disabled { background: var(--line-bright); color: var(--text-dim); cursor: default; }
  .formerr { color: var(--err); font-size: 12.5px; margin-top: 8px; min-height: 15px; }

  .tasklist { flex: 1; overflow-y: auto; padding: 0 10px 14px; }
  .task {
    padding: 11px 12px; margin: 6px 8px; border: 1px solid var(--line); border-radius: 4px;
    cursor: pointer; transition: border-color .15s, background .15s; position: relative;
  }
  .task:hover { border-color: var(--line-bright); }
  .task.sel { border-color: var(--codex); background: var(--codex-dim); }
  .task .req { font-size: 13px; line-height: 1.5; color: var(--text);
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .task .meta { display: flex; gap: 10px; margin-top: 7px; font-size: 11.5px; color: var(--text-dim); align-items: center; }
  .empty { text-align: center; color: var(--text-dim); padding: 40px 20px; font-size: 13px; line-height: 1.8; }

  .badge {
    font-family: var(--disp); font-size: 9.5px; font-weight: 600; letter-spacing: .1em;
    padding: 2px 7px; border-radius: 2px; text-transform: uppercase;
  }
  .badge.queued       { color: var(--text-dim); border: 1px solid var(--line-bright); }
  .badge.running      { color: #0a0c08; background: var(--claude); animation: pulse 1.4s ease-in-out infinite; }
  .badge.approved     { color: #0a0c08; background: var(--ok); }
  .badge.stopped, .badge.interrupted { color: var(--text-dim); background: var(--line); }
  .badge.error        { color: #1a0b0c; background: var(--err); }
  .badge.max_iterations { color: #1a1305; background: var(--warn); }

  /* ───── 우측: 로그 ───── */
  section { display: flex; flex-direction: column; min-width: 0; min-height: 0; }
  .loghead {
    display: flex; align-items: center; gap: 14px; padding: 12px 20px;
    border-bottom: 1px solid var(--line); background: var(--bg-raise); min-height: 54px;
  }
  .loghead .title { font-size: 13.5px; color: var(--text); flex: 1; min-width: 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .loghead .iter { font-family: var(--disp); font-size: 11px; letter-spacing: .12em; color: var(--text-dim); white-space: nowrap; }
  .loghead .iter b { color: var(--text); }
  .loghead .iter .dots { letter-spacing: 2px; color: var(--ok); margin: 0 4px; }
  button.stop {
    font-family: var(--disp); font-size: 11px; font-weight: 600; letter-spacing: .14em;
    color: var(--err); background: transparent; border: 1px solid var(--err);
    border-radius: 3px; padding: 6px 14px; cursor: pointer; transition: all .15s;
  }
  button.stop:hover { background: var(--err); color: #1a0b0c; }
  button.stop[hidden] { display: none; }

  .log { flex: 1; overflow-y: auto; padding: 16px 0 30px; scroll-behavior: auto; }
  .entry { display: grid; grid-template-columns: 86px 1fr; gap: 14px; padding: 5px 20px;
    animation: fade .25s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(3px); } }
  .entry .who {
    font-family: var(--disp); font-size: 10.5px; font-weight: 600; letter-spacing: .14em;
    text-align: right; padding-top: 3px; user-select: none;
  }
  .entry.r-claude .who { color: var(--claude); }
  .entry.r-codex  .who { color: var(--codex); }
  .entry.r-system .who { color: var(--text-faint); }
  .entry .body { white-space: pre-wrap; word-break: break-word; line-height: 1.65; font-size: 13.5px; }
  .entry.k-text.r-claude .body { color: var(--text); border-left: 2px solid var(--claude); padding-left: 12px; background: var(--claude-dim); border-radius: 0 3px 3px 0; padding-top: 6px; padding-bottom: 6px; }
  .entry.k-text.r-codex  .body { color: var(--text); border-left: 2px solid var(--codex); padding-left: 12px; background: var(--codex-dim); border-radius: 0 3px 3px 0; padding-top: 6px; padding-bottom: 6px; }
  .entry.k-tool .body { color: var(--text-dim); font-size: 12.5px; }
  .entry.k-tool .body::before { content: '▸ '; color: var(--text-faint); }
  .entry.k-raw .body { color: var(--text-dim); font-size: 12.5px; }

  /* ───── 마크다운 렌더링 (AI 메시지) ─────
     Claude/Codex의 text는 대부분 마크다운이라 가독성을 위해 HTML로 변환한다.
     .md가 붙으면 컨테이너의 pre-wrap을 끄고 블록 요소를 직접 배치한다. */
  .entry .body.md { white-space: normal; }
  .entry .body.md > :first-child { margin-top: 0; }
  .entry .body.md > :last-child { margin-bottom: 0; }
  .entry .body.md p { margin: 0 0 8px; }
  .entry .body.md h1, .entry .body.md h2, .entry .body.md h3,
  .entry .body.md h4, .entry .body.md h5, .entry .body.md h6 {
    font-family: var(--disp); font-weight: 600; letter-spacing: .04em;
    line-height: 1.3; margin: 13px 0 6px; color: var(--text);
  }
  .entry .body.md h1 { font-size: 16px; }
  .entry .body.md h2 { font-size: 14.5px; }
  .entry .body.md h3 { font-size: 13.5px; }
  .entry .body.md h4, .entry .body.md h5, .entry .body.md h6 { font-size: 12.5px; color: var(--text-dim); }
  .entry .body.md ul, .entry .body.md ol { margin: 4px 0 8px; padding-left: 22px; }
  .entry .body.md li { margin: 2px 0; line-height: 1.5; }
  .entry .body.md code {
    font-family: var(--mono); font-size: .92em; color: var(--codex);
    background: rgba(255, 255, 255, .06); border: 1px solid var(--line);
    border-radius: 3px; padding: 1px 5px;
  }
  .entry .body.md pre {
    background: var(--bg); border: 1px solid var(--line); border-radius: 4px;
    padding: 10px 12px; margin: 6px 0 10px; overflow-x: auto; line-height: 1.5;
  }
  .entry .body.md pre code { background: none; border: none; padding: 0; color: var(--text); font-size: 13px; }
  .entry .body.md blockquote {
    margin: 6px 0; padding: 2px 12px; border-left: 2px solid var(--line-bright); color: var(--text-dim);
  }
  .entry .body.md a { color: var(--codex); text-decoration: underline; }
  .entry .body.md strong { color: #ffffff; font-weight: 600; }
  .entry .body.md em { font-style: italic; }
  .entry .body.md hr { border: none; border-top: 1px dashed var(--line-bright); margin: 10px 0; }

  /* 대화 모드: 도구 호출·원시 진행 로그·부가 정보를 숨기고 두 AI의 메시지만 */
  .log.chat .entry.k-tool,
  .log.chat .entry.k-raw,
  .log.chat .entry.k-info { display: none; }
  .viewtoggle { display: flex; border: 1px solid var(--line-bright); border-radius: 3px; overflow: hidden; }
  .viewtoggle button {
    font-family: var(--disp); font-size: 10.5px; font-weight: 600; letter-spacing: .1em;
    padding: 5px 11px; border: none; cursor: pointer;
    background: transparent; color: var(--text-dim); transition: all .15s;
  }
  .viewtoggle button + button { border-left: 1px solid var(--line-bright); }
  .viewtoggle button.on { background: var(--line-bright); color: var(--text); }
  .entry.k-info .body { color: var(--text-dim); font-style: italic; }
  .entry.k-error .body { color: var(--err); }
  .entry.k-plan .body {
    color: var(--text); border-left: 2px solid var(--warn); padding-left: 12px;
    background: rgba(255, 209, 115, .07); border-radius: 0 3px 3px 0;
    padding-top: 7px; padding-bottom: 7px; font-size: 12px;
  }
  .entry.k-phase { margin: 14px 0 6px; }
  .entry.k-phase .body {
    font-family: var(--disp); font-size: 11px; font-weight: 600; letter-spacing: .2em;
    text-transform: uppercase; color: var(--warn);
    border-top: 1px dashed var(--line-bright); padding-top: 10px;
  }
  .nolog { display: flex; height: 100%; align-items: center; justify-content: center;
    color: var(--text-faint); font-size: 13px; letter-spacing: .06em; flex-direction: column; gap: 10px; }
  .nolog .big { font-family: var(--disp); font-size: 15px; letter-spacing: .3em; color: var(--text-dim); }

  ::-webkit-scrollbar { width: 9px; }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--line-bright); }

  /* ───── 숫자 스테퍼 (네이티브 spin 버튼 대체) ───── */
  .stepper { display: flex; }
  .stepper input {
    text-align: center; border-radius: 0; border-left: 0; border-right: 0;
    padding-left: 2px; padding-right: 2px; appearance: textfield; -moz-appearance: textfield;
  }
  .stepper input::-webkit-outer-spin-button,
  .stepper input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .stepper .step {
    width: 30px; flex: none; background: var(--bg); border: 1px solid var(--line);
    color: var(--text-faint); cursor: pointer; font-family: var(--mono); font-size: 14px;
    line-height: 1; user-select: none; transition: border-color .15s, color .15s;
  }
  .stepper .step:first-child { border-radius: 3px 0 0 3px; }
  .stepper .step:last-child { border-radius: 0 3px 3px 0; }
  .stepper .step:hover { border-color: var(--line-bright); color: var(--text); }
  .stepper .step:active { color: var(--ok); }
  .stepper:focus-within input, .stepper:focus-within .step { border-color: var(--line-bright); }

  /* ───── 폴더 탐색 모달 ───── */
  .cwdrow { display: flex; gap: 6px; }
  .cwdrow input { flex: 1; min-width: 0; }
  button.browse {
    width: 36px; background: var(--bg); border: 1px solid var(--line); border-radius: 3px;
    cursor: pointer; font-size: 14px; transition: border-color .15s;
  }
  button.browse:hover { border-color: var(--line-bright); }
  .modal {
    position: fixed; inset: 0; z-index: 1000; display: flex;
    align-items: center; justify-content: center; background: rgba(0, 0, 0, .65);
    backdrop-filter: blur(2px);
  }
  .modal[hidden] { display: none; }
  .fsbox {
    width: 520px; max-width: 92vw; max-height: 78vh; display: flex; flex-direction: column;
    background: var(--bg-panel); border: 1px solid var(--line-bright); border-radius: 6px;
    box-shadow: 0 18px 60px rgba(0, 0, 0, .6);
  }
  .fshead {
    display: flex; align-items: center; justify-content: space-between;
    padding: 13px 16px; border-bottom: 1px solid var(--line);
    font-family: var(--disp); font-size: 11px; font-weight: 600; letter-spacing: .22em;
    color: var(--text-dim); text-transform: uppercase;
  }
  .fshead button { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 14px; }
  .fshead button:hover { color: var(--text); }
  .fspath {
    padding: 9px 16px; font-size: 11.5px; color: var(--codex);
    border-bottom: 1px solid var(--line); background: var(--bg);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; direction: rtl; text-align: left;
  }
  .fslist { flex: 1; overflow-y: auto; min-height: 220px; padding: 6px 0; }
  .fsitem {
    display: flex; align-items: center; gap: 9px; padding: 7px 16px;
    cursor: pointer; font-size: 13.5px; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .fsitem:hover { background: var(--codex-dim); }
  .fsitem .ico { color: var(--warn); font-size: 13px; flex-shrink: 0; }
  .fsitem.up { color: var(--text-dim); }
  .fserr { padding: 8px 16px; color: var(--err); font-size: 11.5px; min-height: 16px; }
  .fsfoot {
    display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid var(--line); align-items: center;
  }
  .fsfoot input { flex: 1; min-width: 0; }
  .fsfoot button {
    font-family: var(--disp); font-size: 11px; font-weight: 600; letter-spacing: .1em;
    padding: 8px 13px; border-radius: 3px; cursor: pointer; white-space: nowrap;
    background: transparent; border: 1px solid var(--line-bright); color: var(--text-dim);
    transition: all .15s;
  }
  .fsfoot button:hover { color: var(--text); border-color: var(--text-dim); }
  .fsfoot button.pick { background: var(--ok); border-color: var(--ok); color: #0a0c08; }
  .fsfoot button.pick:hover { filter: brightness(1.12); }
  .fsfoot button.pick:disabled { background: var(--line-bright); border-color: var(--line-bright); color: var(--text-dim); cursor: default; filter: none; }
</style>
</head>
<body>
<header>
  <div class="logo"><span class="c1">CLAUDE</span><span class="x">×</span><span class="c2">CODEX</span><span class="cursor"></span></div>
  <div class="srv"><span class="led" id="led"></span><span id="srvtext">IDLE</span></div>
</header>
<main>
  <aside>
    <div class="formbox">
      <h2>새 작업</h2>
      <label>요구사항</label>
      <textarea id="f-req" placeholder="예: 이 폴더에 할 일 관리 CLI를 파이썬으로 만들어줘. 추가/완료/목록 기능 포함."></textarea>
      <div class="row2">
        <div>
          <label>대상 폴더 (절대 경로)</label>
          <div class="cwdrow">
            <input id="f-cwd" placeholder="C:\Users\GIC\repo\my-project" spellcheck="false">
            <button type="button" class="browse" id="f-browse" title="폴더 탐색">📁</button>
          </div>
        </div>
        <div>
          <label>최대 반복 횟수</label>
          <div class="stepper">
            <button type="button" class="step" data-step="-1" tabindex="-1">−</button>
            <input id="f-max" type="number" min="1" max="30" value="8">
            <button type="button" class="step" data-step="1" tabindex="-1">＋</button>
          </div>
        </div>
      </div>
      <div class="row2 eq">
        <div>
          <label>진행 모드</label>
          <select id="f-mode">
            <option value="single" selected>single</option>
            <option value="micro">micro</option>
          </select>
        </div>
        <div>
          <label>Codex 권한 (리뷰어)</label>
          <select id="f-codex">
            <option value="bypass" selected>전체 bypass</option>
            <option value="workspace-write">쓰기 허용</option>
            <option value="read-only">읽기 전용</option>
          </select>
        </div>
      </div>
      <button class="submit" id="f-go">▶ 시작</button>
      <div class="formerr" id="f-err"></div>
    </div>
    <div class="listhead">작업 목록</div>
    <div class="tasklist" id="tasklist">
      <div class="empty">아직 작업이 없습니다.<br>요구사항을 입력하고 시작하세요.</div>
    </div>
  </aside>
  <section>
    <div class="loghead">
      <div class="title" id="lh-title">—</div>
      <div class="iter" id="lh-iter"></div>
      <span id="lh-badge"></span>
      <div class="viewtoggle" id="lh-view">
        <button data-mode="chat" class="on">대화</button><button data-mode="full">전체</button>
      </div>
      <button class="stop" id="lh-stop" hidden>■ STOP</button>
    </div>
    <div class="log" id="log">
      <div class="nolog">
        <div class="big">AI · PAIR</div>
        <div>좌측에서 작업을 선택하거나 새 작업을 시작하세요</div>
      </div>
    </div>
  </section>
</main>
<div class="modal" id="fsmodal" hidden>
  <div class="fsbox">
    <div class="fshead">폴더 선택 <button id="fs-close" title="닫기">✕</button></div>
    <div class="fspath" id="fs-path">내 PC</div>
    <div class="fslist" id="fs-list"></div>
    <div class="fserr" id="fs-err"></div>
    <div class="fsfoot">
      <input id="fs-newname" placeholder="새 폴더 이름" spellcheck="false">
      <button id="fs-mk">＋ 만들기</button>
      <button class="pick" id="fs-pick">이 폴더 선택</button>
    </div>
  </div>
</div>
<script>
'use strict';
const $ = (id) => document.getElementById(id);
const STATUS_KO = {
  queued: '대기', running: '진행중', approved: '승인됨', stopped: '중단됨',
  error: '오류', max_iterations: '반복초과', interrupted: '중단됨(재시작)',
};

let selected = null;   // 선택된 task id
let es = null;         // EventSource
let lastTasks = [];

/* ───── 작업 목록 폴링 ───── */
async function refresh() {
  try {
    const r = await fetch('/api/tasks');
    const data = await r.json();
    lastTasks = data.tasks;
    $('led').className = 'led' + (data.running ? ' busy' : '');
    $('srvtext').textContent = data.running ? 'RUNNING' : 'IDLE';
    renderList();
    if (selected) {
      const t = lastTasks.find((x) => x.id === selected);
      if (t) renderHead(t);
    }
  } catch { /* 서버 일시 단절 */ }
}

function renderList() {
  const box = $('tasklist');
  if (!lastTasks.length) {
    box.innerHTML = '<div class="empty">아직 작업이 없습니다.<br>요구사항을 입력하고 시작하세요.</div>';
    return;
  }
  box.innerHTML = '';
  for (const t of lastTasks) {
    const el = document.createElement('div');
    el.className = 'task' + (t.id === selected ? ' sel' : '');
    el.innerHTML = `
      <div class="req"></div>
      <div class="meta">
        <span class="badge ${t.status}">${STATUS_KO[t.status] || t.status}</span>
        <span>${t.mode || 'single'}</span>
        <span>iter ${t.iteration}/${t.maxIterations}</span>
        <span>${new Date(t.createdAt).toLocaleTimeString('ko-KR', {hour:'2-digit',minute:'2-digit'})}</span>
      </div>`;
    el.querySelector('.req').textContent = t.requirement;
    el.onclick = () => select(t.id);
    box.appendChild(el);
  }
}

/* ───── 작업 선택 + SSE ───── */
function select(id) {
  if (selected === id) return;
  selected = id;
  renderList();
  $('log').innerHTML = '';
  if (es) { es.close(); es = null; }

  const t = lastTasks.find((x) => x.id === id);
  if (t) renderHead(t);

  es = new EventSource(`/api/tasks/${id}/events`);
  es.onmessage = (ev) => addEntry(JSON.parse(ev.data));
  es.addEventListener('status', (ev) => renderHead(JSON.parse(ev.data)));
}

function stepProgress(t) {
  // 마이크로 이터레이션 진행: 완료 ✓ / 현재 ● / 대기 ○
  if (Array.isArray(t.steps) && t.steps.length) {
    const done = t.status === 'approved';
    const dots = t.steps.map((s, i) => {
      if (s.status === 'done') return '✓';
      return (!done && i === t.currentStep) ? '●' : '○';
    }).join('');
    const cur = Math.min((t.currentStep || 0) + 1, t.steps.length);
    return `STEP <b>${cur}</b>/${t.steps.length}<span class="dots">${dots}</span>· ITER <b>${t.iteration}</b>`;
  }
  return `ITER <b>${t.iteration}</b>/${t.maxIterations}`;
}

function renderHead(t) {
  $('lh-title').textContent = t.requirement;
  $('lh-title').title = `${t.requirement}\n${t.cwd}`;
  $('lh-iter').innerHTML = stepProgress(t);
  $('lh-badge').innerHTML = `<span class="badge ${t.status}">${STATUS_KO[t.status] || t.status}</span>`;
  $('lh-stop').hidden = !(t.status === 'running' || t.status === 'queued');
}

function nearBottom(el) { return el.scrollHeight - el.scrollTop - el.clientHeight < 60; }

/* ───── 경량 마크다운 렌더러 (의존성 없음) ─────
   AI 메시지를 안전하게 HTML로 변환한다. 입력은 항상 먼저 이스케이프해
   XSS를 차단하고, 화이트리스트 문법(헤더/목록/코드/굵게/링크 등)만 변환한다. */
function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// 이스케이프된 한 줄에 인라인 문법 적용. 인라인 코드는 플레이스홀더로 보호.
function renderInline(s) {
  const codes = [];
  s = s.replace(/`([^`]+)`/g, (_, c) => `\u0000${codes.push(c) - 1}\u0000`);
  s = s
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, '$1<em>$2</em>')
    .replace(/\[([^\]]+)\]\((https?:\/\/[^)\s"]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  return s.replace(/\u0000(\d+)\u0000/g, (_, n) => `<code>${codes[n]}</code>`);
}

const MD_BLOCK_RE = /^(#{1,6}\s|\s*[-*+]\s|\s*\d+\.\s|>|```|\s*(?:---|\*\*\*|___)\s*$)/;

function renderMarkdown(src) {
  const lines = src.replace(/\r\n/g, '\n').split('\n');
  const out = [];
  let i = 0;
  let listType = null; // 'ul' | 'ol' | null
  const closeList = () => { if (listType) { out.push(`</${listType}>`); listType = null; } };

  while (i < lines.length) {
    const line = lines[i];

    // 펜스 코드 블록 ```lang
    if (/^```/.test(line)) {
      closeList();
      const code = [];
      i++;
      while (i < lines.length && !/^```\s*$/.test(lines[i])) code.push(lines[i++]);
      i++; // 닫는 펜스 건너뜀
      out.push(`<pre><code>${escapeHtml(code.join('\n'))}</code></pre>`);
      continue;
    }
    // 수평선
    if (/^\s*(?:---|\*\*\*|___)\s*$/.test(line)) { closeList(); out.push('<hr>'); i++; continue; }
    // 헤더
    const h = line.match(/^(#{1,6})\s+(.*)$/);
    if (h) { closeList(); out.push(`<h${h[1].length}>${renderInline(escapeHtml(h[2]))}</h${h[1].length}>`); i++; continue; }
    // 인용
    if (/^>\s?/.test(line)) {
      closeList();
      const quote = [];
      while (i < lines.length && /^>\s?/.test(lines[i])) quote.push(lines[i++].replace(/^>\s?/, ''));
      out.push(`<blockquote>${renderInline(escapeHtml(quote.join(' ')))}</blockquote>`);
      continue;
    }
    // 순서 없는 목록
    const ul = line.match(/^\s*[-*+]\s+(.*)$/);
    if (ul) {
      if (listType !== 'ul') { closeList(); out.push('<ul>'); listType = 'ul'; }
      out.push(`<li>${renderInline(escapeHtml(ul[1]))}</li>`); i++; continue;
    }
    // 순서 있는 목록
    const ol = line.match(/^\s*\d+\.\s+(.*)$/);
    if (ol) {
      if (listType !== 'ol') { closeList(); out.push('<ol>'); listType = 'ol'; }
      out.push(`<li>${renderInline(escapeHtml(ol[1]))}</li>`); i++; continue;
    }
    // 빈 줄
    if (!line.trim()) { closeList(); i++; continue; }
    // 일반 문단 — 연속된 비-블록 줄을 모은다
    closeList();
    const para = [];
    while (i < lines.length && lines[i].trim() && !MD_BLOCK_RE.test(lines[i])) para.push(lines[i++]);
    out.push(`<p>${renderInline(escapeHtml(para.join('\n'))).replace(/\n/g, '<br>')}</p>`);
  }
  closeList();
  return out.join('');
}

function addEntry(e) {
  const log = $('log');
  const stick = nearBottom(log);
  const div = document.createElement('div');
  div.className = `entry r-${e.role} k-${e.kind}`;
  const who = e.role === 'claude' ? 'CLAUDE' : e.role === 'codex' ? 'CODEX' : 'SYS';
  div.innerHTML = `<div class="who">${who}</div><div class="body"></div>`;
  const body = div.querySelector('.body');
  // AI의 메시지(text)는 마크다운으로 렌더링, 그 외(도구/원시/시스템)는 평문 그대로
  if (e.kind === 'text' && (e.role === 'claude' || e.role === 'codex')) {
    body.classList.add('md');
    body.innerHTML = renderMarkdown(e.text);
  } else {
    body.textContent = e.text;
  }
  log.appendChild(div);
  if (stick) log.scrollTop = log.scrollHeight;
}

/* ───── 숫자 스테퍼 ───── */
document.querySelectorAll('.stepper .step').forEach((b) => {
  b.onclick = () => {
    const inp = b.parentElement.querySelector('input');
    const min = Number(inp.min) || 1, max = Number(inp.max) || 99;
    const v = (Number(inp.value) || min) + Number(b.dataset.step);
    inp.value = Math.min(max, Math.max(min, v));
  };
});

/* ───── 작업 생성 / 중지 ───── */
$('f-go').onclick = async () => {
  $('f-err').textContent = '';
  const body = {
    requirement: $('f-req').value.trim(),
    cwd: $('f-cwd').value.trim(),
    maxIterations: Number($('f-max').value) || 8,
    codexSandbox: $('f-codex').value,
    mode: $('f-mode').value,
  };
  $('f-go').disabled = true;
  try {
    const r = await fetch('/api/tasks', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await r.json();
    if (!r.ok) { $('f-err').textContent = data.error || '요청 실패'; return; }
    $('f-req').value = '';
    await refresh();
    select(data.id);
  } catch (err) {
    $('f-err').textContent = '서버에 연결할 수 없습니다.';
  } finally {
    $('f-go').disabled = false;
  }
};

$('lh-stop').onclick = async () => {
  if (!selected) return;
  if (!confirm('이 작업을 중단할까요? 실행 중인 AI 프로세스가 종료됩니다.')) return;
  await fetch(`/api/tasks/${selected}/stop`, { method: 'POST' });
  refresh();
};

/* ───── 폴더 탐색 모달 ───── */
const fsState = { path: null, parent: null };

async function fsLoad(p, fallbackToDrives = false) {
  $('fs-err').textContent = '';
  try {
    const r = await fetch('/api/fs' + (p ? `?path=${encodeURIComponent(p)}` : ''));
    const data = await r.json();
    if (!r.ok) {
      $('fs-err').textContent = data.error || '탐색 실패';
      if (fallbackToDrives && p) {
        const err = $('fs-err').textContent;
        await fsLoad(null);
        $('fs-err').textContent = err;
      }
      return;
    }
    fsState.path = data.path;
    fsState.parent = data.parent;
    renderFs(data);
  } catch {
    $('fs-err').textContent = '서버에 연결할 수 없습니다.';
  }
}

function renderFs(data) {
  $('fs-path').textContent = data.path || '내 PC';
  $('fs-pick').disabled = !data.path;
  const list = $('fs-list');
  list.innerHTML = '';
  if (data.parent !== null) {
    const up = document.createElement('div');
    up.className = 'fsitem up';
    up.innerHTML = '<span class="ico">⬆</span> ..';
    up.onclick = () => fsLoad(data.parent); // parent='' → 드라이브 목록
    list.appendChild(up);
  }
  for (const d of data.dirs) {
    const el = document.createElement('div');
    el.className = 'fsitem';
    el.innerHTML = '<span class="ico">📁</span> <span class="nm"></span>';
    el.querySelector('.nm').textContent = d.name;
    el.title = d.path;
    el.onclick = () => fsLoad(d.path);
    list.appendChild(el);
  }
  if (!data.dirs.length) {
    const e = document.createElement('div');
    e.className = 'fsitem up';
    e.textContent = '(하위 폴더 없음)';
    list.appendChild(e);
  }
}

$('f-browse').onclick = () => {
  $('fsmodal').hidden = false;
  $('fs-newname').value = '';
  // 입력된 경로가 있으면 거기서 시작(실패 시 드라이브 목록), 없으면 드라이브 목록
  fsLoad($('f-cwd').value.trim() || null, true);
};
$('fs-close').onclick = () => { $('fsmodal').hidden = true; };
$('fsmodal').onclick = (e) => { if (e.target === $('fsmodal')) $('fsmodal').hidden = true; };

$('fs-pick').onclick = () => {
  if (!fsState.path) return;
  $('f-cwd').value = fsState.path;
  $('fsmodal').hidden = true;
};

$('fs-mk').onclick = async () => {
  const name = $('fs-newname').value.trim();
  if (!name) { $('fs-err').textContent = '새 폴더 이름을 입력하세요.'; return; }
  if (!fsState.path) { $('fs-err').textContent = '드라이브를 먼저 선택하세요.'; return; }
  if (/[\\/:*?"<>|]/.test(name)) { $('fs-err').textContent = '폴더 이름에 쓸 수 없는 문자가 있습니다.'; return; }
  const target = fsState.path.replace(/[\\/]+$/, '') + '\\' + name;
  const r = await fetch('/api/fs/mkdir', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ path: target }),
  });
  const data = await r.json();
  if (!r.ok) { $('fs-err').textContent = data.error || '생성 실패'; return; }
  $('fs-newname').value = '';
  fsLoad(fsState.path);
};

/* ───── 보기 모드: 대화(기본) / 전체 ───── */
function setView(mode) {
  try { localStorage.setItem('aipair-view', mode); } catch { /* 사생활 모드 등 */ }
  $('log').classList.toggle('chat', mode === 'chat');
  for (const b of $('lh-view').querySelectorAll('button')) {
    b.classList.toggle('on', b.dataset.mode === mode);
  }
  const log = $('log');
  log.scrollTop = log.scrollHeight;
}
$('lh-view').onclick = (e) => { if (e.target.dataset.mode) setView(e.target.dataset.mode); };
let savedView = 'chat';
try { savedView = localStorage.getItem('aipair-view') || 'chat'; } catch { /* ignore */ }
setView(savedView);

refresh();
setInterval(refresh, 2500);
</script>
</body>
</html>
